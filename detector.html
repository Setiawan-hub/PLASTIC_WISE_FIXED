<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>

body{
    background-color:white;
    text-align:center;
    margin:0;
}

#status{
    font-size:22px;
    font-weight:bold;
    color:#2E7D32;
    margin-top:10px;
}

canvas{
    border-radius:20px;
    margin-top:10px;
}

</style>

</head>

<body>

<h2 id="status">
Memuat model AI...
</h2>

<div id="webcam-container"></div>

<script>

const URL =
"https://teachablemachine.withgoogle.com/models/DGJNCccZv/";

let model;
let webcam;

let hasilSudahDikirim = false;

let kelasTerakhir = "";
let waktuMulai = 0;

const MIN_CONFIDENCE = 0.95;

const DURASI_STABIL = 1500;

async function init(){

try{

document.getElementById("status").innerHTML =
"Memuat model AI...";

model = await tmImage.load(
URL + "model.json",
URL + "metadata.json"
);

document.getElementById("status").innerHTML =
"Meminta akses kamera...";

webcam = new tmImage.Webcam(
300,
300,
true
);

await webcam.setup();

await webcam.play();

document
.getElementById("webcam-container")
.appendChild(webcam.canvas);

document.getElementById("status").innerHTML =
"AI siap digunakan";

if(window.AppInventor){

window.AppInventor.setWebViewString(
"MODEL_READY"
);

}

window.requestAnimationFrame(loop);

}

catch(err){

document.getElementById("status").innerHTML =
"ERROR : " + err;

}

}



async function loop(){

webcam.update();

await predict();

window.requestAnimationFrame(loop);

}



async function predict(){

if(hasilSudahDikirim){
    return;
}

const prediction =
await model.predict(webcam.canvas);

let bestClass = "";

let bestProb = 0;



for(let i=0;i<prediction.length;i++){

    if(prediction[i].probability > bestProb){

        bestProb = prediction[i].probability;

        bestClass = prediction[i].className;

    }

}



document.getElementById("status").innerHTML =

bestClass +
" (" +
Math.round(bestProb*100) +
"%)";



if(bestProb >= MIN_CONFIDENCE){

    if(bestClass != kelasTerakhir){

        kelasTerakhir = bestClass;

        waktuMulai = Date.now();

    }

    else{

        let lamaStabil =
        Date.now() - waktuMulai;

        if(lamaStabil >= DURASI_STABIL){

            hasilSudahDikirim = true;

            webcam.stop();

            document.getElementById("status").innerHTML =
            "Terdeteksi : " + bestClass;

            if(window.AppInventor){

                window.AppInventor.setWebViewString(
                bestClass
                );

            }

        }

    }

}

else{

    kelasTerakhir = "";

    waktuMulai = 0;

}

}



init();

</script>

</body>
</html>
